name: Split Excel to CSV

on:
  push:
    branches: [main]
    paths:
      - 'HealthRI Imaging metadata model v0.1.0.xlsx'

permissions:
  contents: write

jobs:
  split-csv:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Extract commit message title
        id: commit-msg
        run: |
          TITLE=$(git log -1 --format='%s' "${{ github.sha }}")
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Split Excel into CSVs
        run: python scripts/split_excel_to_csv.py

      - name: Commit and push CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add csv/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "split-csv: ${{ steps.commit-msg.outputs.title }}"
            git push
          fi
